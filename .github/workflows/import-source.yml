name: Import sanitized source snapshot

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Import source archive
        if: ${{ hashFiles('.import/source.part06') != '' }}
        shell: bash
        run: |
          set -euo pipefail
          cat .import/source.part* | base64 --decode > /tmp/qce-ai-backup-source.zip
          unzip -o /tmp/qce-ai-backup-source.zip
          rm -rf .import .github/workflows/import-source.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Initial public release"
          git push
