name: Publish portable release

on:
  push:
    paths:
      - ".github/workflows/publish-portable.yml"

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - name: Check out privacy-safe source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build portable directory
        run: npm.cmd run dist

      - name: Package portable ZIP and release notes
        shell: pwsh
        run: |
          $asset = "release\QCE-AI-Backup-0.1.0-win-x64-portable.zip"
          Compress-Archive -Path "release\win-unpacked" -DestinationPath $asset -CompressionLevel Optimal
          $hash = (Get-FileHash $asset -Algorithm SHA256).Hash
          $notes = @'
          ## 中文

          这是 QCE AI Backup 的首个公开便携版本。

          ### 下载与运行

          1. 下载 `QCE-AI-Backup-0.1.0-win-x64-portable.zip`。
          2. 解压整个 `win-unpacked` 文件夹。
          3. 运行 `QCE AI Backup.exe`。

          ### 隐私

          此便携包不包含发布者的 QQ 号、群聊信息、API Key、代理设置、聊天记录、日志、导出目录或其他个人配置。首次运行后，请在软件中填写自己的配置。

          ### QCE 依赖

          本软件依赖 [QQ Chat Exporter (QCE)](https://github.com/shuakami/qq-chat-exporter)。请在软件内配置已有 QCE，或使用 QCE 更新功能获取新版本。

          ### 文件校验

          SHA-256: `__SHA256__`

          ---

          ## English

          This is the first public portable release of QCE AI Backup.

          ### Download and run

          1. Download `QCE-AI-Backup-0.1.0-win-x64-portable.zip`.
          2. Extract the complete `win-unpacked` folder.
          3. Run `QCE AI Backup.exe`.

          ### Privacy

          This package contains no publisher QQ account, group data, API keys, proxy settings, chat records, logs, export paths, or other personal configuration. Enter your own settings after the first launch.

          ### QCE dependency

          This application depends on [QQ Chat Exporter (QCE)](https://github.com/shuakami/qq-chat-exporter). Configure an existing QCE installation in the app, or obtain a newer version through the built-in QCE update feature.

          ### Checksum

          SHA-256: `__SHA256__`
          '@
          $notes = $notes.Replace("__SHA256__", $hash)
          Set-Content -Path "release\release-notes.md" -Value $notes -Encoding utf8

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create v0.1.0 "release\QCE-AI-Backup-0.1.0-win-x64-portable.zip" --target "89b356faec58ed847f4d9147b17c384b4984a074" --title "QCE AI Backup v0.1.0 便携版 / Portable Edition" --notes-file "release\release-notes.md" --latest

      - name: Remove temporary release workflow
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm ".github/workflows/publish-portable.yml"
          git commit -m "Remove temporary portable release workflow"
          git push
