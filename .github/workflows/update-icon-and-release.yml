name: Publish icon update and portable v0.1.1

on:
  push:
    paths:
      - ".github/workflows/update-icon-and-release.yml"

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - name: Check out privacy-safe source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Restore generated icons
        shell: pwsh
        run: |
          $scriptPath = Join-Path $env:RUNNER_TEMP "restore-icon.cjs"
          @'
          const fs = require('fs');
          const zlib = require('zlib');
          const encoded = fs.readFileSync('.import-icon/payload.b64', 'utf8').trim();
          const payload = JSON.parse(zlib.gunzipSync(Buffer.from(encoded, 'base64')).toString('utf8'));
          fs.writeFileSync('assets/icon.png', Buffer.from(payload.png, 'base64'));
          fs.writeFileSync('assets/icon.ico', Buffer.from(payload.ico, 'base64'));
          '@ | Set-Content -Path $scriptPath -Encoding utf8
          node $scriptPath
          npm.cmd version 0.1.1 --no-git-tag-version --allow-same-version

      - name: Commit clean icon update
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/icon.png assets/icon.ico package.json package-lock.json
          git rm -r .import-icon
          git rm .github/workflows/update-icon-and-release.yml
          git commit -m "Replace app icon and prepare v0.1.1"
          git push
          $commit = git rev-parse HEAD
          "RELEASE_COMMIT=$commit" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Install dependencies
        run: npm ci

      - name: Build portable directory
        run: npm.cmd run dist

      - name: Package portable ZIP and release notes
        shell: pwsh
        run: |
          $asset = "release\QCE-AI-Backup-0.1.1-win-x64-portable.zip"
          Compress-Archive -Path "release\win-unpacked" -DestinationPath $asset -CompressionLevel Optimal
          $hash = (Get-FileHash $asset -Algorithm SHA256).Hash
          $notes = @'
          ## 中文

          v0.1.1 使用了全新的应用图标，针对 Windows 任务栏、系统托盘和小尺寸显示进行了优化。

          ### 下载与运行

          1. 下载 `QCE-AI-Backup-0.1.1-win-x64-portable.zip`。
          2. 解压整个 `win-unpacked` 文件夹。
          3. 运行 `QCE AI Backup.exe`。

          ### 隐私

          此便携包不包含发布者的 QQ 号、群聊信息、API Key、代理设置、聊天记录、日志、导出目录或其他个人配置。

          ### QCE 依赖

          本软件依赖 [QQ Chat Exporter (QCE)](https://github.com/shuakami/qq-chat-exporter)。

          ### 文件校验

          SHA-256: `__SHA256__`

          ---

          ## English

          v0.1.1 introduces a new application icon optimized for the Windows taskbar, system tray, and small display sizes.

          ### Download and run

          1. Download `QCE-AI-Backup-0.1.1-win-x64-portable.zip`.
          2. Extract the complete `win-unpacked` folder.
          3. Run `QCE AI Backup.exe`.

          ### Privacy

          This package contains no publisher QQ account, group data, API keys, proxy settings, chat records, logs, export paths, or other personal configuration.

          ### QCE dependency

          This application depends on [QQ Chat Exporter (QCE)](https://github.com/shuakami/qq-chat-exporter).

          ### Checksum

          SHA-256: `__SHA256__`
          '@
          $notes = $notes.Replace("__SHA256__", $hash)
          Set-Content -Path "release\release-notes.md" -Value $notes -Encoding utf8

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create v0.1.1 "release\QCE-AI-Backup-0.1.1-win-x64-portable.zip" --target "$env:RELEASE_COMMIT" --title "QCE AI Backup v0.1.1 新图标版 / New Icon Edition" --notes-file "release\release-notes.md" --latest
